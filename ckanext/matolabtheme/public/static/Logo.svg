<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 38" width="200" height="38" role="img" aria-label="Your Company">
  <!-- Isometric cube — white/light faces so it reads on any background -->
  <!-- Top face -->
  <polygon points="18,2 34,10 18,18 2,10" fill="rgba(255,255,255,0.95)"/>
  <!-- Left face -->
  <polygon points="2,10 18,18 18,36 2,28" fill="rgba(166,187,200,0.8)"/>
  <!-- Right face -->
  <polygon points="34,10 18,18 18,36 34,28" fill="rgba(200,220,235,0.7)"/>
  <!-- Wordmark — white so it works on dark/teal backgrounds -->
  <text x="44" y="26"
        font-family="system-ui,-apple-system,'Segoe UI',Roboto,Arial,sans-serif"
        font-size="18" font-weight="700" fill="#ffffff" letter-spacing="0.3">Your Company</text>
</svg>
